<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Table Extractor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cream-bg: #FAFAF7;
            --navy: #1a2744;
            --gold: #C9A84C;
            --light-gray: #f5f5f2;
            --border-gray: #e0e0dc;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream-bg);
            color: var(--navy);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 30px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            padding-bottom: 30px;
            border-bottom: 2px solid var(--border-gray);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--navy);
            opacity: 0.7;
            font-weight: 400;
        }

        /* Upload Area */
        .upload-section {
            background: white;
            border: 2px solid var(--border-gray);
            border-radius: 12px;
            padding: 50px 30px;
            text-align: center;
            margin-bottom: 50px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-section:hover {
            border-color: var(--gold);
            background-color: var(--light-gray);
            box-shadow: 0 8px 30px rgba(201, 168, 76, 0.1);
        }

        .upload-section.dragover {
            border-color: var(--gold);
            background-color: var(--light-gray);
            box-shadow: 0 12px 40px rgba(201, 168, 76, 0.15);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .upload-text h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--navy);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .upload-text p {
            color: var(--navy);
            opacity: 0.6;
            margin-bottom: 5px;
        }

        .upload-hint {
            font-size: 0.95rem;
            color: var(--gold);
            margin-top: 15px;
            font-weight: 500;
        }

        #fileInput {
            display: none;
        }

        /* Progress Indicator */
        .progress-section {
            display: none;
            text-align: center;
            margin: 50px 0;
        }

        .progress-section.active {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-gray);
            border-top: 4px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--navy);
            margin-bottom: 10px;
        }

        .progress-status {
            font-size: 0.95rem;
            color: var(--navy);
            opacity: 0.6;
        }

        /* Tables Display */
        .tables-section {
            display: none;
        }

        .tables-section.active {
            display: block;
            animation: fadeIn 0.6s ease-out;
        }

        .tables-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 24px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-group {
            margin-bottom: 60px;
            animation: fadeIn 0.6s ease-out;
        }

        .page-label {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--navy);
            margin: 30px 0 20px 0;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--gold);
        }

        .table-container {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 2px 12px rgba(26, 39, 68, 0.08);
            animation: fadeIn 0.5s ease-out;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--light-gray);
            border-bottom: 1px solid var(--border-gray);
        }

        .table-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--navy);
            font-weight: 600;
        }

        .download-btn {
            background-color: var(--gold);
            color: var(--navy);
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(201, 168, 76, 0.2);
        }

        .download-btn:hover {
            background-color: #B8962E;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(201, 168, 76, 0.3);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: var(--gold);
            color: var(--navy);
            padding: 15px;
            text-align: center;
            font-weight: 600;
            font-size: 0.95rem;
        }

        td {
            padding: 15px;
            text-align: center;
            border: 1px solid var(--border-gray);
            font-size: 0.95rem;
            color: var(--navy);
        }

        tbody tr:nth-child(even) {
            background-color: var(--light-gray);
        }

        tbody tr:nth-child(odd) {
            background-color: white;
        }

        tbody tr:hover {
            background-color: rgba(201, 168, 76, 0.05);
        }

        /* Error Message */
        .error-message {
            display: none;
            background-color: #ffffff;
            border-left: 4px solid #d32f2f;
            color: #d32f2f;
            padding: 20px;
            margin: 20px 0;
            border-radius: 4px;
            animation: fadeIn 0.3s ease-out;
        }

        .error-message.active {
            display: block;
        }

        .error-message strong {
            display: block;
            margin-bottom: 5px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2.2rem;
            }

            .upload-section {
                padding: 40px 20px;
            }

            .upload-text h3 {
                font-size: 1.4rem;
            }

            .page-label {
                font-size: 1.1rem;
            }

            .table-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            td, th {
                padding: 10px;
                font-size: 0.85rem;
            }

            .table-title {
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px 15px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .upload-section {
                padding: 30px 15px;
            }

            .upload-icon {
                font-size: 2rem;
            }

            .upload-text h3 {
                font-size: 1.1rem;
            }

            .subtitle {
                font-size: 0.95rem;
            }

            td, th {
                padding: 8px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>PDF Table Extractor</h1>
            <p class="subtitle">Extract tables from PDFs with precision. Upload, extract, download.</p>
        </header>

        <!-- Upload Section -->
        <div class="upload-section" id="uploadSection">
            <div class="upload-icon">📄</div>
            <div class="upload-text">
                <h3>Upload Your PDF</h3>
                <p>Drag and drop your PDF file here</p>
                <p>or click to select</p>
            </div>
            <p class="upload-hint">Supported format: PDF</p>
            <input type="file" id="fileInput" accept=".pdf" />
        </div>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage">
            <strong id="errorTitle">Error</strong>
            <span id="errorText"></span>
        </div>

        <!-- Progress Indicator -->
        <div class="progress-section" id="progressSection">
            <div class="spinner"></div>
            <div class="progress-text">Processing PDF...</div>
            <div class="progress-status" id="progressStatus">Detecting tables on page 1...</div>
        </div>

        <!-- Tables Display -->
        <div class="tables-section" id="tablesSection">
        </div>
    </div>

    <script>
        const uploadSection = document.getElementById('uploadSection');
        const fileInput = document.getElementById('fileInput');
        const progressSection = document.getElementById('progressSection');
        const tablesSection = document.getElementById('tablesSection');
        const errorMessage = document.getElementById('errorMessage');
        const errorTitle = document.getElementById('errorTitle');
        const errorText = document.getElementById('errorText');
        const progressStatus = document.getElementById('progressStatus');

        let extractedData = null;

        // Click to upload
        uploadSection.addEventListener('click', () => fileInput.click());

        // Drag and drop
        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.classList.add('dragover');
        });

        uploadSection.addEventListener('dragleave', () => {
            uploadSection.classList.remove('dragover');
        });

        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.classList.remove('dragover');
            handleFileSelect(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files);
        });

        async function handleFileSelect(files) {
            if (files.length === 0) return;

            const file = files[0];
            if (!file.name.toLowerCase().endsWith('.pdf')) {
                showError('Invalid File', 'Please upload a PDF file.');
                return;
            }

            await uploadPDF(file);
        }

        async function uploadPDF(file) {
            hideError();
            progressSection.classList.add('active');
            uploadSection.style.display = 'none';
            tablesSection.classList.remove('active');
            tablesSection.innerHTML = '';

            try {
                const formData = new FormData();
                formData.append('file', file);

                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to process PDF');
                }

                const data = await response.json();
                extractedData = data;

                // Display tables
                displayTables(data.pages);
                progressSection.classList.remove('active');
                tablesSection.classList.add('active');

            } catch (error) {
                progressSection.classList.remove('active');
                uploadSection.style.display = 'block';
                showError('Processing Error', error.message);
            }
        }

        function displayTables(pages) {
            let html = '';
            const allTables = [];

            pages.forEach(page => {
                page.tables.forEach((table, tableIdx) => {
                    allTables.push({
                        page_number: page.page_number,
                        table_number: tableIdx + 1,
                        rows: Array.isArray(table) ? table : table.rows,
                        header_row_count: Array.isArray(table) ? 1 : (table.header_row_count || 1),
                        merges: Array.isArray(table) ? [] : (table.merges || [])
                    });
                });
            });

            if (allTables.length > 0) {
                html += `
                    <div class="tables-actions">
                        <button class="download-btn" onclick="downloadAllTables()">
                            Download all tables
                        </button>
                    </div>
                `;
            }

            pages.forEach(page => {
                const pageNumber = page.page_number;
                const tables = page.tables;

                if (tables.length === 0) {
                    return; // Skip pages with no tables
                }

                html += `<div class="page-group">`;
                html += `<div class="page-label">Page ${pageNumber}</div>`;

                tables.forEach((table, tableIdx) => {
                    const tableRows = Array.isArray(table) ? table : table.rows;
                    const headerRowCount = Array.isArray(table) ? 1 : (table.header_row_count || 1);
                    const headerRows = tableRows.slice(0, headerRowCount);
                    const bodyRows = tableRows.slice(headerRowCount);

                    html += `
                        <div class="table-container">
                            <div class="table-header">
                                <div class="table-title">Table ${tableIdx + 1}</div>
                                <button class="download-btn" onclick="downloadTable(${pageNumber}, ${tableIdx})">
                                    ⬇ Download as Excel
                                </button>
                            </div>
                            <table>
                                <thead>
                                    ${headerRows.map(row => `
                                        <tr>
                                            ${row.map(cell => `<th>${escapeHtml(cell || '')}</th>`).join('')}
                                        </tr>
                                    `).join('')}
                                </thead>
                                <tbody>
                                    ${bodyRows.map(row => `
                                        <tr>
                                            ${row.map(cell => `<td>${escapeHtml(cell || '')}</td>`).join('')}
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                });

                html += `</div>`;
            });

            tablesSection.innerHTML = html;
        }

        async function downloadAllTables() {
            try {
                if (!extractedData || !Array.isArray(extractedData.pages)) {
                    showError('Download Error', 'No extracted tables found');
                    return;
                }

                const tables = extractedData.pages.flatMap(page =>
                    page.tables.map((table, tableIdx) => ({
                        page_number: page.page_number,
                        table_number: tableIdx + 1,
                        rows: Array.isArray(table) ? table : table.rows,
                        header_row_count: Array.isArray(table) ? 1 : (table.header_row_count || 1),
                        merges: Array.isArray(table) ? [] : (table.merges || [])
                    }))
                );

                if (tables.length === 0) {
                    showError('Download Error', 'No extracted tables found');
                    return;
                }

                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        tables,
                        filename: 'all_extracted_tables.xlsx'
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to download file');
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'all_extracted_tables.xlsx';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (error) {
                showError('Download Error', error.message);
            }
        }

        async function downloadTable(pageNumber, tableIdx) {
            try {
                if (!extractedData || !extractedData.pages[pageNumber - 1]) {
                    showError('Download Error', 'Table data not found');
                    return;
                }

                const page = extractedData.pages[pageNumber - 1];
                const table = page.tables[tableIdx];

                if (!table) {
                    showError('Download Error', 'Table not found');
                    return;
                }

                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        tables: [{
                            page_number: pageNumber,
                            table_number: tableIdx + 1,
                            rows: Array.isArray(table) ? table : table.rows,
                            header_row_count: Array.isArray(table) ? 1 : (table.header_row_count || 1),
                            merges: Array.isArray(table) ? [] : (table.merges || [])
                        }],
                        filename: `page_${pageNumber}_table_${tableIdx + 1}.xlsx`
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to download file');
                }

                // Create blob and download
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `page_${pageNumber}_table_${tableIdx + 1}.xlsx`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

            } catch (error) {
                showError('Download Error', error.message);
            }
        }

        function showError(title, message) {
            errorTitle.textContent = title;
            errorText.textContent = message;
            errorMessage.classList.add('active');
        }

        function hideError() {
            errorMessage.classList.remove('active');
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
