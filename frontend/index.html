<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Table Extractor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cream-bg: #FAFAF7;
            --navy: #1a2744;
            --gold: #C9A84C;
            --light-gray: #f5f5f2;
            --border-gray: #e0e0dc;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream-bg);
            color: var(--navy);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 30px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            padding-bottom: 30px;
            border-bottom: 2px solid var(--border-gray);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--navy);
            opacity: 0.7;
            font-weight: 400;
        }

        /* Upload Area */
        .upload-section {
            background: white;
            border: 2px solid var(--border-gray);
            border-radius: 12px;
            padding: 50px 30px;
            text-align: center;
            margin-bottom: 50px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-section:hover {
            border-color: var(--gold);
            background-color: var(--light-gray);
            box-shadow: 0 8px 30px rgba(201, 168, 76, 0.1);
        }

        .upload-section.dragover {
            border-color: var(--gold);
            background-color: var(--light-gray);
            box-shadow: 0 12px 40px rgba(201, 168, 76, 0.15);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .upload-text h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--navy);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .upload-text p {
            color: var(--navy);
            opacity: 0.6;
            margin-bottom: 5px;
        }

        .upload-hint {
            font-size: 0.95rem;
            color: var(--gold);
            margin-top: 15px;
            font-weight: 500;
        }

        #fileInput {
            display: none;
        }

        /* Progress Indicator */
        .progress-section {
            display: none;
            text-align: center;
            margin: 50px 0;
        }

        .progress-section.active {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-gray);
            border-top: 4px solid var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--navy);
            margin-bottom: 10px;
        }

        .progress-status {
            font-size: 0.95rem;
            color: var(--navy);
            opacity: 0.6;
        }

        /* Tables Display */
        .tables-section {
            display: none;
        }

        .tables-section.active {
            display: block;
            animation: fadeIn 0.6s ease-out;
        }

        .tables-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 24px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-group {
            margin-bottom: 60px;
            animation: fadeIn 0.6s ease-out;
        }

        .page-label {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--navy);
            margin: 30px 0 20px 0;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--gold);
        }

        .table-container {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 2px 12px rgba(26, 39, 68, 0.08);
            animation: fadeIn 0.5s ease-out;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--light-gray);
            border-bottom: 1px solid var(--border-gray);
        }

        .table-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: var(--navy);
            font-weight: 600;
        }

        .download-btn {
            background-color: var(--gold);
            color: var(--navy);
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(201, 168, 76, 0.2);
        }

        .download-btn:hover {
            background-color: #B8962E;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(201, 168, 76, 0.3);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
        }

        th {
            color: var(--navy);
            padding: 12px 14px;
            text-align: center;
            font-weight: 700;
            font-size: 0.95rem;
            vertical-align: middle;
            border: 1px solid var(--border-gray);
        }

        td {
            padding: 14px 12px;
            text-align: center;
            border: 1px solid var(--border-gray);
            font-size: 0.95rem;
            color: var(--navy);
            vertical-align: middle;
            word-break: normal;
            overflow-wrap: break-word;
        }

        .table-preview td.text-cell {
            text-align: left;
        }

        .table-preview td.numeric-cell {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .table-preview th.empty-header,
        .table-preview td.empty-cell {
            background: transparent;
        }

        .table-preview td.section-row {
            text-align: left;
            font-weight: 700;
            font-style: italic;
            background: #f2efe3;
            color: var(--navy);
        }

        tbody tr:nth-child(even) {
            background-color: var(--light-gray);
        }

        tbody tr:nth-child(odd) {
            background-color: white;
        }

        tbody tr:hover {
            background-color: rgba(201, 168, 76, 0.05);
        }

        /* Error Message */
        .error-message {
            display: none;
            background-color: #ffffff;
            border-left: 4px solid #d32f2f;
            color: #d32f2f;
            padding: 20px;
            margin: 20px 0;
            border-radius: 4px;
            animation: fadeIn 0.3s ease-out;
        }

        .error-message.active {
            display: block;
        }

        .error-message strong {
            display: block;
            margin-bottom: 5px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2.2rem;
            }

            .upload-section {
                padding: 40px 20px;
            }

            .upload-text h3 {
                font-size: 1.4rem;
            }

            .page-label {
                font-size: 1.1rem;
            }

            .table-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            td, th {
                padding: 10px;
                font-size: 0.85rem;
            }

            .table-title {
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px 15px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .upload-section {
                padding: 30px 15px;
            }

            .upload-icon {
                font-size: 2rem;
            }

            .upload-text h3 {
                font-size: 1.1rem;
            }

            .subtitle {
                font-size: 0.95rem;
            }

            td, th {
                padding: 8px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>PDF Table Extractor</h1>
            <p class="subtitle">Extract tables from PDFs with precision. Upload, extract, download.</p>
        </header>

        <!-- Upload Section -->
        <div class="upload-section" id="uploadSection">
            <div class="upload-icon">📄</div>
            <div class="upload-text">
                <h3>Upload Your PDF</h3>
                <p>Drag and drop your PDF file here</p>
                <p>or click to select</p>
            </div>
            <p class="upload-hint">Supported format: PDF</p>
            <input type="file" id="fileInput" accept=".pdf" />
        </div>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage">
            <strong id="errorTitle">Error</strong>
            <span id="errorText"></span>
        </div>

        <!-- Progress Indicator -->
        <div class="progress-section" id="progressSection">
            <div class="spinner"></div>
            <div class="progress-text">Processing PDF...</div>
            <div class="progress-status" id="progressStatus">Detecting tables on page 1...</div>
        </div>

        <!-- Tables Display -->
        <div class="tables-section" id="tablesSection">
        </div>
    </div>

    <script>
        const uploadSection = document.getElementById('uploadSection');
        const fileInput = document.getElementById('fileInput');
        const progressSection = document.getElementById('progressSection');
        const tablesSection = document.getElementById('tablesSection');
        const errorMessage = document.getElementById('errorMessage');
        const errorTitle = document.getElementById('errorTitle');
        const errorText = document.getElementById('errorText');
        const progressStatus = document.getElementById('progressStatus');

        let extractedData = null;

        // Click to upload
        uploadSection.addEventListener('click', () => fileInput.click());

        // Drag and drop
        uploadSection.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadSection.classList.add('dragover');
        });

        uploadSection.addEventListener('dragleave', () => {
            uploadSection.classList.remove('dragover');
        });

        uploadSection.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadSection.classList.remove('dragover');
            handleFileSelect(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files);
        });

        async function handleFileSelect(files) {
            if (files.length === 0) return;

            const file = files[0];
            if (!file.name.toLowerCase().endsWith('.pdf')) {
                showError('Invalid File', 'Please upload a PDF file.');
                return;
            }

            await uploadPDF(file);
        }

        async function uploadPDF(file) {
            hideError();
            progressSection.classList.add('active');
            uploadSection.style.display = 'none';
            tablesSection.classList.remove('active');
            tablesSection.innerHTML = '';

            try {
                const formData = new FormData();
                formData.append('file', file);

                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to process PDF');
                }

                const data = await response.json();
                extractedData = data;

                // Display tables
                displayTables(data.pages);
                progressSection.classList.remove('active');
                tablesSection.classList.add('active');

            } catch (error) {
                progressSection.classList.remove('active');
                uploadSection.style.display = 'block';
                showError('Processing Error', error.message);
            }
        }

        function displayTables(pages) {
            let html = '';
            const allTables = [];

            pages.forEach(page => {
                page.tables.forEach((table, tableIdx) => {
                    allTables.push({
                        page_number: page.page_number,
                        table_number: tableIdx + 1,
                        rows: Array.isArray(table) ? table : table.rows,
                        header_row_count: Array.isArray(table) ? 1 : (table.header_row_count || 1),
                        merges: Array.isArray(table) ? [] : (table.merges || []),
                        row_types: Array.isArray(table) ? [] : (table.row_types || [])
                    });
                });
            });

            if (allTables.length > 0) {
                html += `
                    <div class="tables-actions">
                        <button class="download-btn" onclick="downloadAllTables()">
                            Download all tables
                        </button>
                    </div>
                `;
            }

            pages.forEach(page => {
                const pageNumber = page.page_number;
                const tables = page.tables;

                if (tables.length === 0) {
                    return; // Skip pages with no tables
                }

                html += `<div class="page-group">`;
                html += `<div class="page-label">Page ${pageNumber}</div>`;

                tables.forEach((table, tableIdx) => {
                    const preview = buildPreviewTable(table);

                    html += `
                        <div class="table-container">
                            <div class="table-header">
                                <div class="table-title">Table ${tableIdx + 1}</div>
                                <button class="download-btn" onclick="downloadTable(${pageNumber}, ${tableIdx})">
                                    ⬇ Download as Excel
                                </button>
                            </div>
                            <table class="table-preview">
                                <thead>
                                    ${renderHeaderRows(preview.headerRows)}
                                </thead>
                                <tbody>
                                    ${renderBodyRows(preview.bodyRows, preview.bodyRowTypes)}
                                </tbody>
                            </table>
                        </div>
                    `;
                });

                html += `</div>`;
            });

            tablesSection.innerHTML = html;
        }

        async function downloadAllTables() {
            try {
                if (!extractedData || !Array.isArray(extractedData.pages)) {
                    showError('Download Error', 'No extracted tables found');
                    return;
                }

                const tables = extractedData.pages.flatMap(page =>
                    page.tables.map((table, tableIdx) => ({
                        page_number: page.page_number,
                        table_number: tableIdx + 1,
                        rows: Array.isArray(table) ? table : table.rows,
                        header_row_count: Array.isArray(table) ? 1 : (table.header_row_count || 1),
                        merges: Array.isArray(table) ? [] : (table.merges || []),
                        row_types: Array.isArray(table) ? [] : (table.row_types || [])
                    }))
                );

                if (tables.length === 0) {
                    showError('Download Error', 'No extracted tables found');
                    return;
                }

                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        tables,
                        filename: 'all_extracted_tables.xlsx'
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to download file');
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'all_extracted_tables.xlsx';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (error) {
                showError('Download Error', error.message);
            }
        }

        async function downloadTable(pageNumber, tableIdx) {
            try {
                if (!extractedData || !extractedData.pages[pageNumber - 1]) {
                    showError('Download Error', 'Table data not found');
                    return;
                }

                const page = extractedData.pages[pageNumber - 1];
                const table = page.tables[tableIdx];

                if (!table) {
                    showError('Download Error', 'Table not found');
                    return;
                }

                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        tables: [{
                            page_number: pageNumber,
                            table_number: tableIdx + 1,
                            rows: Array.isArray(table) ? table : table.rows,
                            header_row_count: Array.isArray(table) ? 1 : (table.header_row_count || 1),
                            merges: Array.isArray(table) ? [] : (table.merges || []),
                            row_types: Array.isArray(table) ? [] : (table.row_types || [])
                        }],
                        filename: `page_${pageNumber}_table_${tableIdx + 1}.xlsx`
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to download file');
                }

                // Create blob and download
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `page_${pageNumber}_table_${tableIdx + 1}.xlsx`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

            } catch (error) {
                showError('Download Error', error.message);
            }
        }

        function showError(title, message) {
            errorTitle.textContent = title;
            errorText.textContent = message;
            errorMessage.classList.add('active');
        }

        function hideError() {
            errorMessage.classList.remove('active');
        }

        function buildPreviewTable(table) {
            const rows = Array.isArray(table) ? table : table.rows;
            const headerRowCount = Array.isArray(table) ? 1 : (table.header_row_count || 1);
            const normalized = normalizePreviewRows(rows, headerRowCount);
            const compactRows = normalized.rows;
            const compactMerges = normalized.merges;
            const rowTypes = Array.isArray(table) ? [] : (table.row_types || []);

            return {
                headerRows: applyHeaderMerges(compactRows.slice(0, headerRowCount), compactMerges),
                bodyRows: compactRows.slice(headerRowCount),
                bodyRowTypes: rowTypes.slice(headerRowCount)
            };
        }

        function normalizePreviewRows(rows, headerRowCount) {
            const bodyRows = rows.slice(headerRowCount);
            const columnCount = rows.reduce((max, row) => Math.max(max, row.length), 0);
            const numericColumns = [];

            for (let colIdx = 0; colIdx < columnCount; colIdx += 1) {
                const values = bodyRows.map(row => (row[colIdx] || '').trim()).filter(Boolean);
                if (values.length === 0) {
                    continue;
                }

                const numericRatio = values.filter(isNumericValue).length / values.length;
                if (numericRatio >= 0.55) {
                    numericColumns.push(colIdx);
                }
            }

            const firstNumericCol = numericColumns.length > 0 ? Math.min(...numericColumns) : columnCount;
            const textColumns = [];
            for (let colIdx = 0; colIdx < firstNumericCol; colIdx += 1) {
                textColumns.push(colIdx);
            }

            if (textColumns.length <= 1) {
                const visibleColumns = getVisibleColumns(rows, headerRowCount, columnCount);
                return {
                    rows: rows.map(row => visibleColumns.map(colIdx => row[colIdx] || '')),
                    merges: []
                };
            }

            const numberColumn = textColumns[0];
            const organizationColumns = textColumns.slice(1);
            const logicalColumns = [numberColumn, ...organizationColumns, ...numericColumns];

            const normalizedRows = rows.map((row, rowIdx) => {
                const logicalRow = [];

                if (rowIdx < headerRowCount) {
                    logicalRow.push((row[numberColumn] || '').trim());
                    logicalRow.push(organizationColumns.map(colIdx => row[colIdx] || '').find(value => value.trim()) || '');
                    numericColumns.forEach(colIdx => logicalRow.push(row[colIdx] || ''));
                    return logicalRow;
                }

                const leadingValues = textColumns
                    .map(colIdx => (row[colIdx] || '').trim())
                    .filter(Boolean);

                let rowNumber = '';
                const organizationParts = [];

                leadingValues.forEach(value => {
                    if (!rowNumber) {
                        const match = value.match(/^(\d{1,3})\s+(.+)$/);
                        if (match) {
                            rowNumber = match[1];
                            if (match[2].trim()) {
                                organizationParts.push(match[2].trim());
                            }
                            return;
                        }
                    }

                    if (!rowNumber && /^\d{1,3}$/.test(value)) {
                        rowNumber = value;
                        return;
                    }

                    organizationParts.push(value);
                });

                logicalRow.push(rowNumber);
                logicalRow.push(organizationParts.join(' '));
                numericColumns.forEach(colIdx => logicalRow.push(row[colIdx] || ''));
                return logicalRow;
            });

            const compactVisibleColumns = getVisibleColumns(
                normalizedRows,
                headerRowCount,
                normalizedRows.reduce((max, row) => Math.max(max, row.length), 0)
            );

            return {
                rows: normalizedRows.map(row => compactVisibleColumns.map(colIdx => row[colIdx] || '')),
                merges: []
            };
        }

        function getVisibleColumns(rows, headerRowCount, columnCount) {
            const visible = [];
            for (let colIdx = 0; colIdx < columnCount; colIdx += 1) {
                const hasBodyValue = rows.slice(headerRowCount).some(row => (row[colIdx] || '').trim() !== '');
                const hasHeaderValue = rows.slice(0, headerRowCount).some(row => (row[colIdx] || '').trim() !== '');
                if (hasBodyValue || hasHeaderValue) {
                    visible.push(colIdx);
                }
            }
            return visible;
        }

        function remapMerges(merges, visibleColumns) {
            const indexMap = new Map(visibleColumns.map((colIdx, newIdx) => [colIdx, newIdx]));
            return merges.map(merge => {
                const covered = [];
                for (let colIdx = merge.start_col; colIdx <= merge.end_col; colIdx += 1) {
                    if (indexMap.has(colIdx)) {
                        covered.push(indexMap.get(colIdx));
                    }
                }

                if (covered.length < 2) {
                    return null;
                }

                return {
                    row: merge.row,
                    start_col: Math.min(...covered),
                    end_col: Math.max(...covered)
                };
            }).filter(Boolean);
        }

        function applyHeaderMerges(headerRows, merges) {
            return headerRows.map((row, rowIdx) => {
                const mergeMap = new Map();
                merges
                    .filter(merge => merge.row === rowIdx)
                    .forEach(merge => mergeMap.set(merge.start_col, merge.end_col));

                const cells = [];
                let colIdx = 0;
                while (colIdx < row.length) {
                    const mergeEnd = mergeMap.get(colIdx);
                    if (mergeEnd !== undefined) {
                        const mergedText = row.slice(colIdx, mergeEnd + 1).find(cell => (cell || '').trim() !== '') || '';
                        cells.push({
                            value: mergedText,
                            colspan: (mergeEnd - colIdx) + 1
                        });
                        colIdx = mergeEnd + 1;
                        continue;
                    }

                    cells.push({
                        value: row[colIdx] || '',
                        colspan: 1
                    });
                    colIdx += 1;
                }
                return cells;
            });
        }

        function renderHeaderRows(headerRows) {
            return headerRows.map(row => `
                <tr>
                    ${row.map(cell => `
                        <th colspan="${cell.colspan}" class="${cell.value.trim() ? '' : 'empty-header'}">${escapeHtml(cell.value)}</th>
                    `).join('')}
                </tr>
            `).join('');
        }

        function renderBodyRows(bodyRows, bodyRowTypes = []) {
            const textColumnIndex = findPrimaryTextColumn(bodyRows);
            return bodyRows.map((row, rowIdx) => {
                if (bodyRowTypes[rowIdx] === 'section') {
                    const sectionText = row.find(cell => (cell || '').trim()) || '';
                    return `
                        <tr>
                            <td colspan="${Math.max(row.length, 1)}" class="section-row">${escapeHtml(sectionText)}</td>
                        </tr>
                    `;
                }

                return `
                <tr>
                    ${row.map((cell, colIdx) => {
                        const value = cell || '';
                        const classes = [];
                        if (!value.trim()) {
                            classes.push('empty-cell');
                        } else if (colIdx === textColumnIndex) {
                            classes.push('text-cell');
                        } else if (isNumericValue(value)) {
                            classes.push('numeric-cell');
                        }
                        return `<td class="${classes.join(' ')}">${escapeHtml(value)}</td>`;
                    }).join('')}
                </tr>
            `;
            }).join('');
        }

        function findPrimaryTextColumn(rows) {
            let bestIndex = 0;
            let bestScore = -1;

            const columnCount = rows.reduce((max, row) => Math.max(max, row.length), 0);
            for (let colIdx = 0; colIdx < columnCount; colIdx += 1) {
                const values = rows.map(row => (row[colIdx] || '').trim()).filter(Boolean);
                if (values.length === 0) {
                    continue;
                }

                const textScore = values.reduce((score, value) => score + (isNumericValue(value) ? 0 : value.length), 0);
                if (textScore > bestScore) {
                    bestScore = textScore;
                    bestIndex = colIdx;
                }
            }

            return bestIndex;
        }

        function isNumericValue(value) {
            const compact = value.replace(/,/g, '').replace(/%/g, '').replace(/[()]/g, '').trim();
            return compact !== '' && /^[-+]?\d+(\.\d+)?$/.test(compact);
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
